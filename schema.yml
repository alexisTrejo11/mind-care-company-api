        1. Years experience cannot be negative
        2. Consultation fee cannot be negative
        3. Rating must be between 0 and 5 (inclusive)
        4. License number uniqueness is checked in service layer

        **Permissions:**
        - Specialists can update their own profiles
        - Staff and admins can update any profile

        **Note:** Business logic validation (like license uniqueness) is handled
        in the service layer. This serializer only performs format validation.
      properties:
        license_number:
          type: string
          description: Professional license number. Uniqueness validated in service
            layer.
          maxLength: 50
        specialization:
          $ref: '#/components/schemas/SpecializationEnum'
        qualifications:
          type: string
          description: Educational and professional qualifications
        years_experience:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        consultation_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_accepting_new_patients:
          type: boolean
        bio:
          type: string
          description: Professional biography and background
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          description: Average patient rating (0.00-5.00)
      required:
      - consultation_fee
      - license_number
      - specialization
      - years_experience
    SpecializationEnum:
      enum:
      - psychologist
      - psychiatrist
      - therapist
      - counselor
      - general_physician
      - nutritionist
      - physiotherapist
      - neurologist
      - other
      type: string
      description: |-
        * `psychologist` - Psychologist
        * `psychiatrist` - Psychiatrist
        * `therapist` - Therapist
        * `counselor` - Counselor
        * `general_physician` - General Physician
        * `nutritionist` - Nutritionist
        * `physiotherapist` - Physiotherapist
        * `neurologist` - Neurologist
        * `other` - Other
    StatusEnum:
      enum:
      - scheduled
      - confirmed
      - in_progress
      - completed
      - cancelled
      - no_show
      type: string
      description: |-
        * `scheduled` - Scheduled
        * `confirmed` - Confirmed
        * `in_progress` - In Progress
        * `completed` - Completed
        * `cancelled` - Cancelled
        * `no_show` - No Show
    UserLogin:
      type: object
      description: Serializer for user login
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    UserRegistration:
      type: object
      description: Serializer for user registration
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          writeOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        phone:
          type: string
          nullable: true
          maxLength: 50
        date_of_birth:
          type: string
          format: date
          nullable: true
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          default: patient
      required:
      - email
      - first_name
      - last_name
      - password
    UserTypeEnum:
      enum:
      - patient
      - specialist
      type: string
      description: |-
        * `patient` - Patient
        * `specialist` - Specialist
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
