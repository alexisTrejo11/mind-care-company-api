          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/v2/auth/password/reset/request/:
    post:
      operationId: api_v2_auth_password_reset_request_create
      description: Solicitar reseteo de contraseña
      tags:
      - api
