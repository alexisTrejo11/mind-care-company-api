        appointment_date:
          type: string
          format: date-time
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          maximum: 9223372036854775807
          minimum: 5
          format: int64
        status:
