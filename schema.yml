  /api/v2/services/:
    get:
      operationId: api_v2_services_list
      description: List services with search and filters
      parameters:
      - in: query
        name: base_price__gte
        schema:
          type: number
      - in: query
        name: base_price__lte
        schema:
          type: number
      - in: query
        name: category
        schema:
          type: string
          enum:
          - diagnostic
          - general_medicine
          - mental_health
          - specialist_consultation
          - therapy
          - wellness
        description: |-
          * `mental_health` - Mental Health
          * `general_medicine` - General Medicine
          * `specialist_consultation` - Specialist Consultation
          * `diagnostic` - Diagnostic
          * `therapy` - Therapy
          * `wellness` - Wellness
      - in: query
        name: duration_minutes__gte
        schema:
          type: integer
      - in: query
        name: duration_minutes__lte
        schema:
          type: integer
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedServiceList'
          description: ''
    post:
      operationId: api_v2_services_create
      description: Create new service using ServiceServiceLayer
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCreate'
          description: ''
  /api/v2/services/{id}/:
    get:
      operationId: api_v2_services_retrieve
      description: Get service details with specialists who offer it
      parameters:
      - in: path
        name: id
        schema:
