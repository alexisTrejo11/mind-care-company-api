openapi: 3.0.3
info:
  title: Mind Care Hub API
  version: 2.0.0
  description: API documentation for Mind Care Hub
paths:
  /api/v2/auth/activate/:
    post:
      operationId: api_v2_auth_activate_create
      description: Activate user account via email token
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailActivation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailActivation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailActivation'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailActivation'
          description: ''
  /api/v2/auth/login/:
    post:
      operationId: api_v2_auth_login_create
      description: Authenticate user and return JWT tokens
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
          description: ''
  /api/v2/auth/logout/:
    post:
      operationId: api_v2_auth_logout_create
      description: Logout user and blacklist refresh token
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/auth/password/change/:
    post:
      operationId: api_v2_auth_password_change_create
      description: Change password. Requires current password.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          multipart/form-data:
            schema:
