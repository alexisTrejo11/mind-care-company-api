      description: Update medical record
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalRecordUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MedicalRecordUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MedicalRecordUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordUpdate'
          description: ''
    patch:
      operationId: api_v2_medical_records_partial_update
      description: Unified ViewSet to handle all medical record operations
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMedicalRecordUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMedicalRecordUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMedicalRecordUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordUpdate'
          description: ''
    delete:
      operationId: api_v2_medical_records_destroy
      description: Delete medical record
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v2/medical-records/{id}/change-confidentiality/:
