    PatchedSpecialistUpdate:
      type: object
      description: |-
        Serializer for updating existing specialist profiles.

        Allows partial updates of specialist information.

        **Updatable Fields:**
        - `license_number`: Professional license number (format validation only)
        - `specialization`: Medical specialization
        - `qualifications`: Educational and professional qualifications
        - `years_experience`: Years of experience (≥ 0)
        - `consultation_fee`: Consultation fee (≥ 0)
        - `is_accepting_new_patients`: New patient acceptance status
        - `bio`: Professional biography
        - `rating`: Patient rating (0.00-5.00)

        **Validation Rules:**
        1. Years experience cannot be negative
        2. Consultation fee cannot be negative
        3. Rating must be between 0 and 5 (inclusive)
        4. License number uniqueness is checked in service layer

        **Permissions:**
        - Specialists can update their own profiles
        - Staff and admins can update any profile

        **Note:** Business logic validation (like license uniqueness) is handled
        in the service layer. This serializer only performs format validation.
      properties:
        license_number:
          type: string
          description: Professional license number. Uniqueness validated in service
            layer.
          maxLength: 50
        specialization:
          $ref: '#/components/schemas/SpecializationEnum'
        qualifications:
          type: string
          description: Educational and professional qualifications
        years_experience:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        consultation_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_accepting_new_patients:
          type: boolean
        bio:
          type: string
          description: Professional biography and background
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          description: Average patient rating (0.00-5.00)
    Service:
