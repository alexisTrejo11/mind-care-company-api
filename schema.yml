  /api/v2/specialists/:
    get:
      operationId: api_v2_specialists_list
      description: "\n        Retrieve a paginated list of healthcare specialists
        with advanced filtering,\n        searching, and ordering capabilities.\n\n
        \       **Features:**\n        - Filter by specialization, rating, fees, experience\n
        \       - Search by name, email, qualifications, bio\n        - Order by rating,
        consultation fee, or experience\n        - Pagination support\n        - Service-specific
        filtering\n        "
      summary: List specialists
      parameters:
      - in: query
        name: consultation_fee__gte
        schema:
          type: number
      - in: query
        name: consultation_fee__lte
        schema:
          type: number
      - in: query
        name: is_accepting_new_patients
        schema:
          type: boolean
      - in: query
        name: max_fee
        schema:
          type: number
          format: float
        description: Maximum consultation fee
        examples:
          Maximum$200:
            value: 200.0
            summary: Maximum $200
      - in: query
        name: min_rating
        schema:
          type: number
          format: float
        description: Minimum rating (0-5)
        examples:
          4.5StarsOrHigher:
            value: 4.5
            summary: 4.5 stars or higher
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -consultation_fee
          - -rating
          - -years_experience
          - consultation_fee
          - rating
          - years_experience
        description: Order results
        examples:
          HighestRatingFirst:
            value: -rating
            summary: Highest rating first
      - in: query
        name: page
        schema:
          type: integer
        description: 'Page number (default: 1)'
        examples:
          Page2:
            value: 2
            summary: Page 2
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Items per page (default: 20, max: 100)'
        examples:
          50ItemsPerPage:
            value: 50
            summary: 50 items per page
      - in: query
        name: rating__gte
        schema:
          type: number
      - in: query
        name: rating__lte
        schema:
          type: number
      - in: query
        name: search
        schema:
          type: string
        description: Search in name, email, qualifications, or bio
        examples:
          SearchFor'Dr.Smith':
            value: Smith
            summary: Search for 'Dr. Smith'
      - in: query
        name: service_id
        schema:
          type: integer
        description: Filter by service ID
        examples:
          TherapyService:
            value: 1
            summary: Therapy service
      - in: query
        name: specialization
        schema:
          type: string
          enum:
          - counselor
          - general_physician
          - neurologist
          - nutritionist
          - other
          - physiotherapist
          - psychiatrist
          - psychologist
          - therapist
        description: Filter by medical specialization
        examples:
          Psychologist:
            value: psychologist
          Psychiatrist:
            value: psychiatrist
      - in: query
        name: years_experience__gte
        schema:
          type: integer
      - in: query
        name: years_experience__lte
        schema:
          type: integer
      tags:
      - Specialists
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSpecialistList'
              examples:
                SuccessfulResponse:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - success: true
                      message: Specialists retrieved successfully
                      data:
                      - id: 1
                        specialist_name: Dr. Jane Smith
                        license_number: MD123456
                        bio: Board-certified psychiatrist...
                        specialization: psychiatrist
                        years_experience: 10
                        consultation_fee: '150.00'
                        is_accepting_new_patients: true
                        rating: '4.8'
                        email: dr.smith@example.com
                        phone: '+1234567890'
                        service_count: 5
                      pagination:
                        total: 45
                        page: 1
                        page_size: 20
                        total_pages: 3
                  summary: Successful response
          description: List of specialists retrieved successfully
        '400':
          description: Invalid search parameters
        '429':
          description: Rate limit exceeded
    post:
      operationId: api_v2_specialists_create
      description: "\n        Create a new healthcare specialist profile.\n\n        **Permissions:**
        Admin or staff only\n\n        **Note:** User must exist in the system and
        not already have a specialist profile.\n        "
      summary: Create specialist profile
      tags:
      - Specialists
      - Admin
      requestBody:
        content:
          application/json:
            schema:
