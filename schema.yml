  /api/v2/medical-records/:
    get:
      operationId: api_v2_medical_records_list
      description: List medical records with advanced filtering
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMedicalRecordList'
          description: ''
    post:
      operationId: api_v2_medical_records_create
      description: Create new medical record
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalRecordCreate'
          application/x-www-form-urlencoded:
            schema:
