    Specialist:
      type: object
      description: |-
        Serializer for listing and basic specialist information.

        Used in list views where only essential information is required.

        **Fields Description:**

        | Field | Type | Description |
        |-------|------|-------------|
        | id | Integer | Unique identifier for the specialist |
        | specialist_name | String | Full name (first + last) of the specialist |
        | license_number | String | Professional medical license number |
        | bio | String | Professional biography and background |
        | specialization | String | Medical specialization area |
        | years_experience | Integer | Number of years of professional experience |
        | consultation_fee | Decimal | Fee for initial consultation (in local currency) |
        | is_accepting_new_patients | Boolean | Whether currently accepting new patients |
        | rating | Decimal | Average patient rating (0.00 - 5.00) |
        | email | String | Contact email address |
        | phone | String | Contact phone number |
        | service_count | Integer | Number of services offered by the specialist |

        **Specialization Choices:**

        - `psychologist`: Psychologist
        - `psychiatrist`: Psychiatrist
        - `therapist`: Therapist
        - `counselor`: Counselor
        - `general_physician`: General Physician
        - `nutritionist`: Nutritionist
        - `physiotherapist`: Physiotherapist
        - `neurologist`: Neurologist
        - `other`: Other

        **Example Response:**
        ```json
        {
            "id": 1,
            "specialist_name": "Dr. Jane Smith",
            "license_number": "MD123456",
            "bio": "Board-certified psychiatrist...",
            "specialization": "psychiatrist",
            "years_experience": 10,
            "consultation_fee": "150.00",
            "is_accepting_new_patients": true,
            "rating": "4.8",
            "email": "dr.smith@example.com",
            "phone": "+1234567890",
            "service_count": 5
        }
        ```
      properties:
        id:
          type: integer
          readOnly: true
        specialist_name:
          type: string
          description: Full name of the specialist (first name + last name)
          readOnly: true
        license_number:
          type: string
          maxLength: 50
        bio:
          type: string
        specialization:
          $ref: '#/components/schemas/SpecializationEnum'
        years_experience:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        consultation_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_accepting_new_patients:
          type: boolean
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          readOnly: true
        email:
          type: string
          format: email
          description: Email address for contacting the specialist
          readOnly: true
        phone:
          type: string
          description: Phone number for appointments and inquiries
          readOnly: true
        service_count:
          type: integer
          description: Number of healthcare services offered by this specialist
          readOnly: true
      required:
      - consultation_fee
      - email
      - id
      - license_number
      - phone
      - rating
      - service_count
      - specialist_name
      - specialization
      - years_experience
    SpecialistCreate:
      type: object
      description: |-
        Serializer for creating new specialist profiles.

        Handles both specialist profile creation and optional user information updates.

        **Required Fields:**
        - `user_id`: ID of the existing user to associate with specialist profile
        - `license_number`: Professional license number (min 3 characters)
        - `specialization`: Medical specialization
        - `years_experience`: Years of experience (≥ 0)
        - `consultation_fee`: Consultation fee (≥ 0)

        **Optional Fields:**
        - `email`: Update user's email (must be valid email format)
        - `first_name`: Update user's first name
        - `last_name`: Update user's last name
        - `phone`: Update user's phone number
        - `qualifications`: Educational and professional qualifications
        - `is_accepting_new_patients`: New patient acceptance status (default: True)
        - `bio`: Professional biography
        - `rating`: Initial rating (0.00-5.00, optional)

        **Validation Rules:**
        1. User must exist and not already have a specialist profile
        2. License number must be at least 3 characters
        3. Years experience cannot be negative
        4. Consultation fee cannot be negative
        5. Rating must be between 0 and 5 (if provided)

        **Permissions:** Admin or staff only
      properties:
        user_id:
          type: integer
          minimum: 1
          description: ID of the user account to associate with the specialist profile
        email:
          type: string
          format: email
          description: Email address for the specialist (updates user email if provided)
        first_name:
          type: string
          description: First name of the specialist (updates user first name if provided)
          maxLength: 30
        last_name:
          type: string
          description: Last name of the specialist (updates user last name if provided)
          maxLength: 30
        phone:
          type: string
          description: Phone number for the specialist (updates user phone if provided)
          maxLength: 20
        license_number:
          type: string
          maxLength: 50
        specialization:
          $ref: '#/components/schemas/SpecializationEnum'
        qualifications:
          type: string
          description: Educational and professional qualifications
        years_experience:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        consultation_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_accepting_new_patients:
          type: boolean
          description: 'Whether accepting new patients (default: True)'
        bio:
          type: string
          description: Professional biography and background
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          description: Initial rating (0.00-5.00). If not provided, defaults to 0.00
      required:
      - consultation_fee
      - license_number
      - specialization
      - user_id
      - years_experience
    SpecialistDetail:
      type: object
      description: |-
        Detailed serializer for comprehensive specialist profile information.

        Includes nested relationships for services and availability.
        Used in detail views where complete information is required.

        **Fields Description:**

        | Field | Type | Description |
        |-------|------|-------------|
        | id | Integer | Unique identifier for the specialist |
        | user_info | Object | Basic user information (nested) |
        | license_number | String | Professional medical license number |
        | specialization | String | Medical specialization area |
        | qualifications | String | Educational and professional qualifications |
        | years_experience | Integer | Years of professional experience |
        | consultation_fee | Decimal | Initial consultation fee |
        | is_accepting_new_patients | Boolean | Accepting new patients status |
        | bio | String | Detailed professional biography |
        | rating | Decimal | Average patient rating (0.00 - 5.00) |
        | services | Array[Object] | List of services offered (nested) |
        | availability | Array[Object] | Availability schedule (nested) |

        **Nested user_info Object:**
        ```json
        {
            "full_name": "Dr. Jane Smith",
            "email": "dr.smith@example.com",
            "phone": "+1234567890"
        }
        ```

        **Notes:**
        - Rating is calculated based on patient reviews
        - Services include both base services and specialist-specific overrides
        - Availability shows recurring schedule patterns
      properties:
        id:
          type: integer
          readOnly: true
        user_info:
          type: object
          additionalProperties: {}
          description: Basic user information including name, email, and phone
          readOnly: true
        license_number:
          type: string
          readOnly: true
        specialization:
          allOf:
          - $ref: '#/components/schemas/SpecializationEnum'
          readOnly: true
        qualifications:
          type: string
          readOnly: true
        years_experience:
          type: integer
          readOnly: true
        consultation_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        is_accepting_new_patients:
          type: boolean
          readOnly: true
        bio:
          type: string
          readOnly: true
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
          readOnly: true
        services:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
          description: List of healthcare services offered by this specialist
        availability:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
          description: Recurring availability schedule for appointments
      required:
      - availability
      - bio
      - consultation_fee
      - id
      - is_accepting_new_patients
      - license_number
      - qualifications
      - rating
      - services
      - specialization
      - user_info
      - years_experience
